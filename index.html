<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Legend Dice</title>
  <style>
    :root {
      --bg: #1e2231;
      --panel: #2a2f42;
      --panel-2: #343a52;
      --border: #444a66;
      --text: #e9e9f2;
      --text-dim: #9fa3b8;
      --accent: #bb99ff;
      --accent-strong: #9b6dff;
      --green: #6fe3a5;
      --red: #ff7b7b;
      --gold: #ffd166;
      --orange: #ff9b3d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      height: 100%;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 10px;
      gap: 8px;
    }
    h1 {
      font-size: 15px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
    }
    h1 svg { width: 18px; height: 18px; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .attr-grid {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 3px;
    }
    .attr-grid button {
      padding: 4px 0;
      font-size: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      cursor: pointer;
    }
    .attr-grid button:hover { background: var(--panel-2); border-color: var(--accent); }
    .dice-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }
    .dice-row button {
      padding: 7px 0;
      font-weight: 600;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
    }
    .dice-row button:hover { background: var(--panel-2); border-color: var(--accent); }
    .hint { font-size: 10.5px; color: var(--text-dim); margin-top: 3px; }
    #pool {
      min-height: 34px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    #pool .empty { color: var(--text-dim); font-size: 12px; padding: 0 4px; }
    .chip {
      background: var(--panel-2);
      border: 1px solid var(--accent-strong);
      border-radius: 5px;
      padding: 2px 6px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .chip:hover { background: #3f4663; }
    .chip span { color: var(--text-dim); font-weight: 400; margin-left: 4px; }
    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .toggle input { accent-color: var(--accent-strong); cursor: pointer; }
    .adv-ctrl {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .adv-ctrl button {
      width: 24px; height: 24px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      line-height: 1;
    }
    .adv-ctrl button:hover { border-color: var(--accent); }
    #advLabel { min-width: 86px; text-align: center; font-size: 12.5px; }
    #advLabel.adv { color: var(--green); }
    #advLabel.dis { color: var(--red); }
    .roll-bar { display: flex; gap: 6px; }
    #rollBtn {
      flex: 1;
      padding: 9px;
      font-size: 15px;
      font-weight: 700;
      background: var(--accent-strong);
      border: none;
      border-radius: 7px;
      color: #fff;
      cursor: pointer;
    }
    #rollBtn:hover { background: #8a58f5; }
    #rollBtn:disabled { background: var(--panel-2); color: var(--text-dim); cursor: default; }
    #clearBtn {
      padding: 9px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-dim);
      cursor: pointer;
    }
    #clearBtn:hover { color: var(--text); border-color: var(--red); }
    #history {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 2px;
    }
    .entry {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 8px;
    }
    .entry-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }
    .entry-name { font-weight: 600; font-size: 12.5px; }
    .entry-total { font-size: 18px; font-weight: 800; color: var(--orange); }
    .entry-formula { font-size: 11.5px; color: var(--text-dim); margin-bottom: 4px; }
    .entry-formula .adv { color: var(--green); }
    .entry-formula .dis { color: var(--red); }
    .die-results { display: flex; flex-wrap: wrap; gap: 4px; }
    .die {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 12px;
    }
    .die .dtype { color: var(--text-dim); margin-right: 4px; font-size: 10.5px; }
    .die.exploded { border-color: var(--gold); }
    .die.exploded .sum { color: var(--gold); font-weight: 700; }
    .die.dropped { opacity: 0.45; text-decoration: line-through; }
    .die .extra-mark { color: var(--accent); font-size: 10px; margin-left: 3px; }
    .log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #clearLogBtn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 4px;
    }
    #clearLogBtn:hover { color: var(--red); text-decoration: underline; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
        <path d="M12 2 L21 7 L21 17 L12 22 L3 17 L3 7 Z" />
      </svg>
      Open Legend Dice
    </h1>

    <div>
      <div class="section-label">Attribute score (sets d20 + attribute dice)</div>
      <div class="attr-grid" id="attrGrid"></div>
    </div>

    <div>
      <div class="section-label">Add dice</div>
      <div class="dice-row" id="diceRow"></div>
      <div class="hint">Left-click adds a die &middot; right-click removes one &middot; click a chip below to remove</div>
    </div>

    <div id="pool"><span class="empty">No dice selected</span></div>

    <div class="options">
      <label class="toggle" title="A die that rolls its maximum value is rolled again and added (can chain)">
        <input type="checkbox" id="explodeToggle" checked />
        Exploding
      </label>
      <div class="adv-ctrl" title="Advantage: roll extra attribute dice, drop the lowest. Disadvantage: drop the highest.">
        <button id="advMinus">&minus;</button>
        <span id="advLabel">Normal</span>
        <button id="advPlus">+</button>
      </div>
    </div>

    <div class="roll-bar">
      <button id="rollBtn">Roll</button>
      <button id="clearBtn" title="Clear dice pool">Clear</button>
    </div>

    <div class="log-head">
      <div class="section-label" style="margin-bottom:0">Roll log (shared)</div>
      <button id="clearLogBtn" title="Remove your own rolls from the shared log">Clear my rolls</button>
    </div>
    <div id="history"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
